<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Ciel -->
  <rect width="400" height="300" fill="#87CEEB"/>

  <!-- Soleil -->
  <circle cx="350" cy="50" r="35" fill="#FFD700" opacity="0.9"/>
  <line x1="350" y1="5" x2="350" y2="0" stroke="#FFD700" stroke-width="3"/>
  <line x1="385" y1="20" x2="390" y2="16" stroke="#FFD700" stroke-width="3"/>
  <line x1="395" y1="50" x2="400" y2="50" stroke="#FFD700" stroke-width="3"/>

  <!-- Herbe -->
  <rect y="200" width="400" height="100" fill="#5D8A3C"/>
  <rect y="190" width="400" height="20" fill="#6FAF45" rx="10"/>

  <!-- Chemin -->
  <ellipse cx="200" cy="270" rx="80" ry="15" fill="#C8A87A" opacity="0.6"/>
  <rect x="160" y="200" width="80" height="70" fill="#C8A87A" rx="5" opacity="0.5"/>

  <!-- Arbres -->
  <!-- Arbre gauche -->
  <rect x="40" y="130" width="12" height="80" fill="#6B4226"/>
  <circle cx="46" cy="120" r="38" fill="#3A7D44"/>
  <circle cx="28" cy="135" r="25" fill="#2E6B38"/>
  <circle cx="64" cy="135" r="25" fill="#2E6B38"/>

  <!-- Arbre droit -->
  <rect x="330" y="130" width="12" height="80" fill="#6B4226"/>
  <circle cx="336" cy="120" r="38" fill="#3A7D44"/>
  <circle cx="318" cy="135" r="25" fill="#2E6B38"/>
  <circle cx="354" cy="135" r="25" fill="#2E6B38"/>

  <!-- Clôture parc à chien -->
  <rect x="100" y="155" width="200" height="4" fill="#8B6914" rx="2"/>
  <rect x="100" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <rect x="296" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <rect x="140" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <rect x="180" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <rect x="220" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <rect x="260" y="155" width="4" height="50" fill="#8B6914" rx="2"/>
  <!-- Portail -->
  <rect x="196" y="155" width="8" height="30" fill="#A0780F" rx="2"/>

  <!-- Panneau "Parc à Chien" -->
  <rect x="95" y="125" width="130" height="30" fill="#FFFFFF" rx="5" stroke="#8B6914" stroke-width="2"/>
  <text x="160" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4A3000" text-anchor="middle">Parc à Chien</text>
  <rect x="155" y="150" width="10" height="10" fill="#8B6914"/>

  <!-- Chien 1 (golden retriever simplifié) -->
  <!-- Corps -->
  <ellipse cx="165" cy="220" rx="28" ry="16" fill="#D4A84B"/>
  <!-- Tête -->
  <circle cx="190" cy="210" r="14" fill="#D4A84B"/>
  <!-- Museau -->
  <ellipse cx="198" cy="215" rx="8" ry="6" fill="#C49030"/>
  <!-- Nez -->
  <ellipse cx="201" cy="212" rx="3" ry="2" fill="#1A0A00"/>
  <!-- Oeil -->
  <circle cx="194" cy="207" r="2" fill="#1A0A00"/>
  <circle cx="193" cy="206" r="0.7" fill="white"/>
  <!-- Oreilles -->
  <ellipse cx="183" cy="201" rx="7" ry="10" fill="#C49030" transform="rotate(-15 183 201)"/>
  <!-- Queue -->
  <path d="M137 215 Q120 195 130 185" stroke="#D4A84B" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Pattes -->
  <rect x="148" y="232" width="8" height="14" fill="#C49030" rx="4"/>
  <rect x="162" y="232" width="8" height="14" fill="#C49030" rx="4"/>
  <rect x="176" y="232" width="8" height="14" fill="#C49030" rx="4"/>

  <!-- Chien 2 (petit chien) -->
  <ellipse cx="240" cy="225" rx="18" ry="10" fill="#A0522D"/>
  <circle cx="255" cy="218" r="10" fill="#A0522D"/>
  <ellipse cx="262" cy="222" rx="5" ry="4" fill="#8B4513"/>
  <ellipse cx="264" cy="220" rx="2" ry="1.5" fill="#1A0A00"/>
  <circle cx="259" cy="215" r="1.5" fill="#1A0A00"/>
  <ellipse cx="249" cy="211" rx="5" ry="7" fill="#8B4513" transform="rotate(-10 249 211)"/>
  <path d="M222 222 Q210 208 218 200" stroke="#A0522D" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="230" y="232" width="5" height="10" fill="#8B4513" rx="3"/>
  <rect x="240" y="232" width="5" height="10" fill="#8B4513" rx="3"/>
  <rect x="250" y="232" width="5" height="10" fill="#8B4513" rx="3"/>

  <!-- Balles -->
  <circle cx="210" cy="235" r="5" fill="#FF4500"/>
  <circle cx="275" cy="230" r="4" fill="#32CD32"/>

  <!-- Nuages -->
  <ellipse cx="80" cy="40" rx="40" ry="20" fill="white" opacity="0.85"/>
  <ellipse cx="105" cy="30" rx="30" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="55" cy="35" rx="25" ry="15" fill="white" opacity="0.85"/>

  <ellipse cx="240" cy="55" rx="35" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="262" cy="45" rx="25" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="218" cy="50" rx="22" ry="13" fill="white" opacity="0.8"/>
</svg>
